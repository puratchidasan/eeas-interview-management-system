# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud Configuration
# European Commission — Interview Management System
#
# Prerequisites:
#   1. Create a project on https://sonarcloud.io
#   2. Obtain your SONAR_TOKEN from https://sonarcloud.io/account/security
#   3. Add SONAR_TOKEN to Jenkins credentials as 'sonarcloud-token'
#   4. Update sonar.organization and sonar.projectKey below
#
# Run manually:
#   mvn sonar:sonar -Dsonar.login=<YOUR_TOKEN>
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=ec-interview-management-system
sonar.organization=your-sonarcloud-org
sonar.projectName=EC Interview Management System
sonar.projectVersion=1.0.0

# Source paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Coverage report path (generated by JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions — config, DTOs, entities, and generated code are excluded from analysis
sonar.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/entity/**,\
  **/*Application.java,\
  **/exception/ResourceNotFoundException.java,\
  **/exception/BusinessException.java

sonar.cpd.exclusions=**/dto/**,**/entity/**

# Language
sonar.language=java
sonar.java.source=19

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true

# SonarCloud host
sonar.host.url=https://sonarcloud.io
