spring:
  application:
    name: interview-management-system
  profiles:
    active: dev

  # Jackson configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL

  # JPA base config
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Application info
info:
  app:
    name: European Commission Interview Management System
    version: 1.0.0
    description: DevSecOps showcase — full interview lifecycle API

# Logging
logging:
  level:
    eu.commission.ims: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# SpringDoc / Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
