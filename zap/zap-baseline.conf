# OWASP ZAP Baseline Scan Configuration
# European Commission — Interview Management System
#
# This file configures which ZAP alerts to treat as WARN (log) vs FAIL (break build).
# Used by the Jenkins pipeline stage: DAST — OWASP ZAP
#
# Rule format:
#   <rule-id>	IGNORE | WARN | FAIL	# Comment
#
# Full rule list: https://www.zaproxy.org/docs/alerts/

# ─── Authentication ───────────────────────────────────────────────────────────
# Basic Auth used intentionally for demo — suppress auth warning
10105	WARN	# HTTP Only Site

# ─── Headers ──────────────────────────────────────────────────────────────────
10015	WARN	# Incomplete or No Cache-control Header Set
10016	WARN	# Web Browser XSS Protection Not Enabled
10017	WARN	# Cross-Domain JavaScript Source File Inclusion
10020	WARN	# X-Frame-Options Header Not Set
10021	WARN	# X-Content-Type-Options Header Missing
10035	WARN	# Strict-Transport-Security Header Not Set (acceptable for dev)
10036	WARN	# Server Leaks Version Information via "Server" HTTP Response Header
10038	WARN	# Content Security Policy (CSP) Header Not Set
10098	WARN	# Cross-Domain Misconfiguration

# ─── Application-Level ────────────────────────────────────────────────────────
10055	WARN	# CSP Scanner
10094	WARN	# Base64 Disclosure
10096	WARN	# Timestamp Disclosure
10110	WARN	# Dangerous JS Function
10027	WARN	# Information Disclosure - Suspicious Comments

